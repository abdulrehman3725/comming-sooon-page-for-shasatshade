<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shasta Shade</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 800px;
      padding: 40px;
    }

    h1 {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #00ffcc, #00c3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      font-size: 2rem;
      font-weight: 300;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    a {
      color: #00ffcc;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    .glow {
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px rgba(0,255,204,0.5), 0 0 20px rgba(0,195,255,0.3);
      }
      to {
        text-shadow: 0 0 20px rgba(0,255,204,1), 0 0 40px rgba(0,195,255,0.6);
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2.5rem;
      }
      h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="glow">SHASTA SHADE</h1>
    <h2>Coming Soon</h2>
    <p>
      Premium shade systems & greenhouse solutions are on the way.<br><br>
      Contact us: 
      <a href="mailto:tommy@shastashade.com">tommy@shastashade.com</a>
    </p>
  </div>
</body>
</html>
